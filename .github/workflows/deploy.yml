name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navegar al directorio del proyecto
            if [ -d "$HOME/projects/arandano_landing" ]; then
              cd ~/projects/arandano_landing
            elif [ -d "$HOME/ARANDANO" ]; then
              cd ~/ARANDANO
            else
              echo "❌ Directorio del proyecto no encontrado"
              exit 1
            fi
            
            # Hacer pull de los cambios más recientes
            echo "📥 Actualizando código desde Git..."
            git fetch origin
            git reset --hard origin/main
            
            # Instalar dependencias
            echo "📦 Instalando dependencias..."
            npm ci --production=false
            
            # Crear build de producción
            echo "🔨 Creando build de producción..."
            npm run build
            
            # Reiniciar aplicación con PM2
            echo "🔄 Reiniciando aplicación..."
            if pm2 list | grep -q "arandano-app"; then
              pm2 restart arandano-app
            else
              pm2 start npm --name "arandano-app" -- start
              pm2 startup 2>/dev/null || true
              pm2 save
            fi
            
            echo "✅ Despliegue completado!"
            pm2 status arandano-app

