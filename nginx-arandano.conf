# Configuración de Nginx para Arándano Café Bar
# Copiar a: /etc/nginx/sites-available/arandano
# Esta configuración funciona sin dominio (solo con IP pública)
# Cuando tengas un dominio, actualiza 'server_name' con tu dominio

# Configuración HTTP (80) - Reverse Proxy a puerto 3000
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;  # Acepta cualquier hostname/IP

    # Logs
    access_log /var/log/nginx/arandano-access.log;
    error_log /var/log/nginx/arandano-error.log;

    # Configuración para Next.js - Reverse Proxy al puerto 3000
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Cache para archivos estáticos de Next.js
    location /_next/static {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, immutable";
    }

    # Cache para imágenes
    location /images {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, immutable";
    }

    # Favicon y otros archivos estáticos
    location ~* \.(ico|css|js|gif|jpe?g|png|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Seguridad adicional
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

# NOTA: Cuando tengas un dominio y quieras usar HTTPS (443):
# 1. Actualiza 'server_name _;' a 'server_name tu-dominio.com www.tu-dominio.com;'
# 2. Ejecuta: sudo certbot --nginx -d tu-dominio.com -d www.tu-dominio.com
# 3. Certbot agregará automáticamente la configuración SSL y redirección HTTP -> HTTPS

